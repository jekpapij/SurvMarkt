<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurvMarkt — Masuk</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{ font-family: 'Inter', sans-serif; }
.font-display{ font-family: 'Lora', serif; }
.font-mono{ font-family: 'JetBrains Mono', monospace; }
.eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}
body{
    background:
        radial-gradient(circle at 20% 30%, rgba(79,70,229,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 10%, rgba(245,158,11,0.10) 0%, transparent 40%),
        linear-gradient(160deg, #312E81 0%, #4F46E5 50%, #1e1b4b 100%);
    min-height: 100vh;
}
.form-card{
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
}
.field-group{
    transition: opacity 0.25s ease, max-height 0.35s cubic-bezier(0.16,1,0.3,1);
    overflow: hidden;
    max-height: 500px;
}
.field-group.hidden-fields{
    opacity: 0;
    max-height: 0;
    pointer-events: none;
}
select, input[type="number"]{
    appearance: none;
    -webkit-appearance: none;
}
input:focus, select:focus{
    outline: none;
    border-color: #4F46E5;
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen px-4 py-10">

<div class="w-full max-w-sm">

    <!-- Logo above card -->
    <div class="text-center mb-7">
        <a href="landing.html" class="inline-block">
            <h1 class="font-display text-3xl font-semibold text-white">SurvMarkt</h1>
        </a>
        <p class="font-mono text-xs text-indigo-200 tracking-widest mt-1 uppercase">
            Marketplace Responden Penelitian
        </p>
    </div>

    <div class="form-card rounded-2xl shadow-2xl p-8">

        <p class="eyebrow text-indigo-600 mb-1">Selamat datang</p>
        <p class="font-display text-xl text-indigo-900 mb-6">Pilih peran & masuk</p>

        <!-- ROLE -->
        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 tracking-wide uppercase">
                Role
            </label>
            <select
                id="role"
                onchange="toggleRespondentFields()"
                class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 bg-slate-50 cursor-pointer"
            >
                <option value="researcher">Peneliti</option>
                <option value="respondent">Responden</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <!-- RESPONDENT FIELDS: hanya muncul kalau pilih Responden -->
        <div id="respondentFields" class="field-group hidden-fields">

            <!-- GENDER -->
            <div class="mb-4">
                <label class="block text-xs font-semibold text-slate-500 mb-1.5 tracking-wide uppercase">
                    Gender
                </label>
                <select
                    id="gender"
                    class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 bg-slate-50 cursor-pointer"
                >
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <!-- AGE -->
            <div class="mb-4">
                <label class="block text-xs font-semibold text-slate-500 mb-1.5 tracking-wide uppercase">
                    Umur
                </label>
                <input
                    id="age"
                    type="number"
                    min="17"
                    placeholder="Minimal 17 tahun"
                    class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 bg-slate-50"
                >
            </div>

            <!-- STATUS -->
            <div class="mb-4">
                <label class="block text-xs font-semibold text-slate-500 mb-1.5 tracking-wide uppercase">
                    Status
                </label>
                <select
                    id="status"
                    class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 bg-slate-50 cursor-pointer"
                >
                    <option value="Mahasiswa">Mahasiswa</option>
                    <option value="Pekerja">Pekerja</option>
                    <option value="Umum">Masyarakat Umum</option>
                </select>
            </div>

        </div>

        <!-- SUBMIT -->
        <button
            onclick="login()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 transition text-white py-3 rounded-xl font-semibold text-sm mt-2"
        >
            Masuk ke SurvMarkt →
        </button>

        <p class="text-center text-xs text-slate-400 mt-5">
            Belum kenal SurvMarkt?
            <a href="landing.html" class="text-indigo-600 hover:underline font-medium">Lihat landing page</a>
        </p>

    </div>

</div>

<script>

function toggleRespondentFields(){
    let role   = document.getElementById("role").value;
    let fields = document.getElementById("respondentFields");

    if(role === "respondent"){
        fields.classList.remove("hidden-fields");
    } else {
        fields.classList.add("hidden-fields");
    }
}

function login(){

    let role = document.getElementById("role").value;

    if(role === "respondent"){

        let ageVal = Number(document.getElementById("age").value);

        if(!ageVal || ageVal < 17){
            alert("Umur minimal 17 tahun!");
            return;
        }

        localStorage.setItem("gender", document.getElementById("gender").value);
        localStorage.setItem("age",    ageVal);
        localStorage.setItem("status", document.getElementById("status").value);

    } else {
        localStorage.removeItem("gender");
        localStorage.removeItem("age");
        localStorage.removeItem("status");
    }

    localStorage.setItem("role", role);

    if(!localStorage.getItem("wallet")){
        localStorage.setItem("wallet", 100000);
    }

    window.location.href = "dashboard.html";

}

toggleRespondentFields();

</script>

</body>
</html>
