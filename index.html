<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurvMarkt</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-600 via-blue-500 to-cyan-400 min-h-screen flex items-center justify-center">

<div class="bg-white w-[400px] rounded-2xl shadow-2xl p-8">

    <!-- HEADER -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-600">SurvMarkt</h1>
        <p class="text-gray-500 text-sm mt-1">Marketplace Responden Penelitian</p>
    </div>

    <!-- ROLE -->
    <div class="mb-4">
        <label class="font-semibold text-gray-700">Pilih Role</label>
        <select id="role" class="w-full border rounded-lg p-2 mt-1">
            <option value="researcher">Peneliti</option>
            <option value="respondent">Responden</option>
            <option value="admin">Admin</option>
        </select>
    </div>

    <!-- GENDER -->
    <div class="mb-4">
        <label class="font-semibold text-gray-700">Gender</label>
        <select id="gender" class="w-full border rounded-lg p-2 mt-1">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
    </div>

    <!-- AGE -->
    <div class="mb-4">
        <label class="font-semibold text-gray-700">Umur</label>
        <input
            id="age"
            type="number"
            min="17"
            placeholder="Minimal 17 Tahun"
            class="w-full border rounded-lg p-2 mt-1"
        >
    </div>

    <!-- STATUS -->
    <div class="mb-6">
        <label class="font-semibold text-gray-700">Status</label>
        <select id="status" class="w-full border rounded-lg p-2 mt-1">
            <option value="Mahasiswa">Mahasiswa</option>
            <option value="Pekerja">Pekerja</option>
        </select>
    </div>

    <!-- SUBMIT -->
    <button
        onclick="login()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 transition text-white py-3 rounded-lg font-semibold"
    >
        Masuk ke SurvMarkt
    </button>

</div>

<script>
function login(){

    let ageVal = Number(document.getElementById("age").value);

    if(ageVal < 17){
        alert("Umur minimal 17 tahun!");
        return;
    }

    localStorage.setItem("role",   document.getElementById("role").value);
    localStorage.setItem("gender", document.getElementById("gender").value);
    localStorage.setItem("age",    ageVal);
    localStorage.setItem("status", document.getElementById("status").value);

    if(!localStorage.getItem("wallet")){
        localStorage.setItem("wallet", 100000);
    }

    window.location.href = "dashboard.html";

}
</script>

</body>
</html>
